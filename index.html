<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍷 Minha Adega</title>
    <style>
        :root {
            --vinho: #7b1a2e;
            --bege: #f5f0eb;
            --verde: #28a745;
            --cinza: #6c757d;
            --azul: #007bff;
            --laranja: #e87722;
            --card: #ffffff;
            --inp: #f7f3ef;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bege); color: #333; }
        #app-root { padding-bottom: 60px; }

        .header { background: var(--vinho); padding: 18px 16px; display: flex; align-items: center; gap: 12px; }
        .header-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .header-title { flex: 1; }
        .header-title h1 { color: #fff; font-size: 22px; font-weight: 700; line-height: 1.1; }
        .header-title small { color: rgba(255,255,255,0.6); font-size: 13px; }
        .btn-add { background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.4); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }

        .dica { background: #eef4ff; border-left: 4px solid #4a90d9; margin: 12px; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #2c5aa0; }
        .dica strong { color: #1a3a6e; }

        .inner { padding: 12px; max-width: 600px; margin: 0 auto; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-card { background: var(--card); border-radius: 14px; padding: 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .stat-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--bege); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .stat-label { font-size: 11px; color: #888; }
        .stat-value { font-size: 17px; font-weight: 700; color: #222; }

        .filtros-card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .busca-wrap { display: flex; align-items: center; background: var(--inp); border-radius: 10px; padding: 0 12px; margin-bottom: 10px; }
        .busca-wrap span { color: #aaa; margin-right: 8px; }
        .busca-wrap input { flex: 1; border: none; background: transparent; padding: 11px 0; font-size: 14px; outline: none; font-family: inherit; }
        .filtros-row { display: flex; gap: 10px; }
        .filtros-row select { flex: 1; background: var(--inp); border: none; border-radius: 10px; padding: 10px 12px; font-size: 13px; font-family: inherit; color: #333; outline: none; }

        .wine-card { background: var(--card); border-radius: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
        .wine-card-inner { display: flex; gap: 12px; padding: 14px; }
        .wine-foto { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; background: #ede8e2; flex-shrink: 0; border: 1px solid #e0d8d0; }
        .wine-foto-ph { width: 80px; height: 80px; border-radius: 10px; background: #ede8e2; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid #e0d8d0; }
        .wine-body { flex: 1; min-width: 0; }
        .wine-nome { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
        .wine-sub { font-size: 12px; color: #888; margin-bottom: 5px; }
        .wine-stars { font-size: 15px; margin-bottom: 5px; }
        .wine-meta { font-size: 12px; color: #555; line-height: 1.8; }
        .wine-valor { color: var(--verde); font-weight: 600; }
        .wine-aval { font-size: 12px; color: #666; font-style: italic; margin-top: 4px; }
        .wine-qty { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .btn-qty { background: #ede8e2; color: #555; border: none; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .qty-val { font-weight: 700; font-size: 14px; min-width: 22px; text-align: center; }
        .wine-footer { padding: 0 14px 12px; display: flex; align-items: center; justify-content: space-between; }
        .badge-cons { background: #fff0f0; color: #c0392b; font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid #f5c6c6; }
        .wine-actions { display: flex; gap: 6px; }
        .btn-sm { padding: 5px 10px; font-size: 11px; border: none; border-radius: 8px; cursor: pointer; color: #fff; font-weight: 600; }

        .backup-row { display: flex; gap: 10px; }
        .backup-row button, .backup-row label { flex: 1; padding: 11px; border: none; border-radius: 10px; background: #e0d8d0; color: #555; font-weight: 600; font-size: 12px; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; }
        .pix-card { background: #fff8e1; border: 1px solid #ffe082; border-radius: 14px; padding: 14px; text-align: center; }
        .pix-titulo { font-size: 14px; font-weight: 700; color: #b8860b; margin-bottom: 4px; }
        .pix-chave { font-size: 13px; color: #555; }

        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; align-items: flex-end; justify-content: center; }
        .modal-bg.on { display: flex; }
        .modal-box { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: 20px 20px 40px; }
        .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .modal-head h2 { font-size: 20px; font-weight: 700; }
        .btn-close { background: #f0f0f0; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center; }
        .flabel { font-size: 13px; color: #555; font-weight: 500; display: block; margin-bottom: 4px; }
        .fgroup { margin-bottom: 14px; }
        .frow { display: flex; gap: 12px; margin-bottom: 14px; }
        .frow .fgroup { flex: 1; margin-bottom: 0; }
        .finput { width: 100%; padding: 12px 14px; background: var(--inp); border: 1.5px solid transparent; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; color: #333; }
        .finput:focus { border-color: var(--vinho); }
        textarea.finput { resize: vertical; min-height: 88px; }
        .nome-wrap { display: flex; gap: 8px; align-items: center; }
        .nome-wrap .finput { flex: 1; }
        .lbtn { display: flex; width: 46px; height: 46px; border-radius: 12px; color: #fff; font-size: 20px; cursor: pointer; align-items: center; justify-content: center; flex-shrink: 0; }
        .lbtn input { display: none; }
        .lbtn.cam { background: var(--laranja); }
        .lbtn.gal { background: #555; }
        .ocr-st { font-size: 12px; margin-top: 4px; min-height: 16px; }
        #fotoPreview { display: none; width: 100%; max-height: 130px; object-fit: cover; border-radius: 10px; margin-top: 8px; }
        .stars-row { display: flex; gap: 6px; margin-top: 4px; }
        .stars-row span { font-size: 28px; cursor: pointer; opacity: 0.2; }
        .stars-row span.on { opacity: 1; }
        .btn-salvar { width: 100%; padding: 14px; background: var(--vinho); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px; }
        .btn-cancelar { width: 100%; padding: 12px; background: #f0f0f0; color: #555; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }

        .ocr-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; padding: 16px; }
        .ocr-bg.on { display: flex; }
        .ocr-box { background: #fff; border-radius: 14px; padding: 20px; width: 100%; max-width: 420px; }
        .ocr-box h3 { margin: 0 0 10px; color: var(--vinho); }
        #ocrFotoPreview { width: 100%; max-height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; display: none; }
        .ocr-box textarea { width: 100%; min-height: 70px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; margin-bottom: 12px; }
        .ocr-btns { display: flex; gap: 10px; }
        .ocr-btns button { flex: 1; padding: 11px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; }
        .ocr-ok { background: var(--vinho); color: #fff; }
        .ocr-no { background: #eee; color: #555; }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
        #overlay.on { display: flex; }
        #overlay p { color: #fff; font-size: 17px; font-weight: 700; }
        .spin { width: 52px; height: 52px; border: 5px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: sp .8s linear infinite; }
        @keyframes sp { to { transform: rotate(360deg); } }
        .empty { text-align: center; color: #aaa; padding: 30px 0; font-size: 14px; }
    </style>
</head>
<body>
    <div id="app-root"></div>

    <div id="overlay"><div class="spin"></div><p>⏳ Lendo rótulo...</p></div>

    <div class="ocr-bg" id="ocrBg">
        <div class="ocr-box">
            <h3>📷 Confirmar nome</h3>
            <img id="ocrFotoPreview" alt="">
            <p style="font-size:13px;color:#666;margin-bottom:8px">Edite se necessário:</p>
            <textarea id="ocrTexto" rows="3"></textarea>
            <div class="ocr-btns">
                <button class="ocr-no" onclick="fecharOcr()">Cancelar</button>
                <button class="ocr-ok" onclick="confirmarOcr()">✔ Usar este nome</button>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="modalBg">
        <div class="modal-box">
            <div class="modal-head">
                <h2 id="formTitulo">Adicionar Vinho</h2>
                <button class="btn-close" onclick="fecharForm()">✕</button>
            </div>
            <input type="hidden" id="wineId">
            <div class="fgroup">
                <label class="flabel">Nome do Vinho *</label>
                <div class="nome-wrap">
                    <input type="text" class="finput" id="nome" placeholder="Ex: Malbec Reserva 2022">
                    <label class="lbtn cam" title="Câmera">📷<input type="file" accept="image/*" capture="environment" id="inputCamera"></label>
                    <label class="lbtn gal" title="Galeria">🖼️<input type="file" accept="image/*" id="inputGaleria"></label>
                </div>
                <div class="ocr-st" id="ocrStatus"></div>
                <img id="fotoPreview" alt="preview">
            </div>
            <div class="frow">
                <div class="fgroup"><label class="flabel">Uva</label><input type="text" class="finput" id="uva" placeholder="Ex: Malbec"></div>
                <div class="fgroup"><label class="flabel">Local</label><input type="text" class="finput" id="local" placeholder="Ex: Estoque"></div>
            </div>
            <div class="frow">
                <div class="fgroup"><label class="flabel">Safra</label><input type="number" class="finput" id="safra" placeholder="2022"></div>
                <div class="fgroup"><label class="flabel">Valor (R$)</label><input type="number" class="finput" id="valor" step="0.01" placeholder="89,90"></div>
            </div>
            <div class="frow">
                <div class="fgroup"><label class="flabel">Data</label><input type="date" class="finput" id="data"></div>
                <div class="fgroup"><label class="flabel">Quantidade</label><input type="number" class="finput" id="quantidade" placeholder="1"></div>
            </div>
            <div class="fgroup">
                <label class="flabel">Avaliação</label>
                <textarea class="finput" id="avaliacao" placeholder="Aromas, sabor, corpo, harmonização..."></textarea>
            </div>
            <div class="fgroup">
                <label class="flabel">Nota</label>
                <div class="stars-row" id="starsRow">
                    <span onclick="setNota(1)">⭐</span>
                    <span onclick="setNota(2)">⭐</span>
                    <span onclick="setNota(3)">⭐</span>
                    <span onclick="setNota(4)">⭐</span>
                    <span onclick="setNota(5)">⭐</span>
                </div>
                <input type="hidden" id="nota" value="5">
            </div>
            <button class="btn-salvar" id="btnMain" onclick="salvar()">GRAVAR VINHO</button>
            <button class="btn-cancelar" id="btnCancel" style="display:none" onclick="limpar()">CANCELAR EDIÇÃO</button>
        </div>
    </div>

    <script>
        const DB_NAME = "adega_v6";
        let fotoBase64 = "";
        let notaSel = 5;

        function montarInterface() {
            const root = document.getElementById('app-root');
            root.innerHTML = `
                <div class="header">
                    <div class="header-icon">🍷</div>
                    <div class="header-title">
                        <h1>Minha Adega</h1>
                        <small>Wine Log</small>
                    </div>
                    <button class="btn-add" onclick="abrirForm()">+ Adicionar</button>
                </div>
                <div class="dica">
                    💡 <strong>Dica:</strong> Toque em 📷 no nome para capturar o rótulo pela câmera!
                </div>
                <div class="inner">
                    <div class="stats-grid" style="margin-top:12px">
                        <div class="stat-card"><div class="stat-icon">📦</div><div><div class="stat-label">Em Estoque</div><div class="stat-value" id="sQtd">0 garrafas</div></div></div>
                        <div class="stat-card"><div class="stat-icon">⭐</div><div><div class="stat-label">Nota Média</div><div class="stat-value" id="sNota">—</div></div></div>
                        <div class="stat-card" style="grid-column:span 2"><div class="stat-icon">💲</div><div><div class="stat-label">Valor em Estoque</div><div class="stat-value" id="sValor">R$ 0,00</div></div></div>
                    </div>
                    <div class="filtros-card">
                        <div class="busca-wrap">
                            <span>🔍</span>
                            <input type="text" id="buscaTexto" placeholder="Buscar por nome, uva, local..." oninput="carregar()">
                        </div>
                        <div class="filtros-row">
                            <select id="filtroStatus" onchange="carregar()">
                                <option value="todos">📋 Todos</option>
                                <option value="estoque">📦 Em Estoque</option>
                                <option value="consumidos">🍷 Consumidos</option>
                            </select>
                            <select id="ordemLista" onchange="carregar()">
                                <option value="dataDesc">🕐 Recentes</option>
                                <option value="dataAsc">🕐 Antigos</option>
                                <option value="notaDesc">⭐ Melhores Notas</option>
                            </select>
                        </div>
                    </div>
                    <div id="lista"></div>
                    <div class="backup-row" style="margin-top:16px;border-top:1px solid #ddd;padding-top:16px">
                        <button onclick="exportarDados()">📥 Exportar Backup</button>
                        <label>📤 Importar Backup<input type="file" accept=".txt" style="display:none" onchange="importarDados(event)"></label>
                    </div>
                    <div class="pix-card" style="margin-top:12px;margin-bottom:20px">
                        <div class="pix-titulo">☕ Ajude a manter o projeto</div>
                        <div class="pix-chave">Pix: <strong>45183732434</strong> <span style="color:#999;font-size:11px">(CPF)</span></div>
                    </div>
                </div>
            `;
            carregar();
        }

        function setNota(n) {
            notaSel = n;
            document.getElementById('nota').value = n;
            document.querySelectorAll('#starsRow span').forEach((s, i) => s.classList.toggle('on', i < n));
        }

        function renderStars(n) {
            n = n || 0;
            return `<span style="color:#f0a500">${'⭐'.repeat(n)}</span><span style="opacity:0.2">${'⭐'.repeat(5-n)}</span>`;
        }

        function abrirForm() {
            document.getElementById('modalBg').classList.add('on');
            document.getElementById('formTitulo').textContent = 'Adicionar Vinho';
            document.getElementById('btnCancel').style.display = 'none';
            document.getElementById('btnMain').textContent = 'GRAVAR VINHO';
            setNota(5);
        }

        function fecharForm() {
            document.getElementById('modalBg').classList.remove('on');
            limpar();
        }

        function comprimirImagem(file, maxPx, q) {
            return new Promise((res, rej) => {
                const r = new FileReader();
                r.onerror = rej;
                r.onload = ev => {
                    const img = new Image();
                    img.onerror = rej;
                    img.onload = () => {
                        const c = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxPx) { h = h*maxPx/w; w = maxPx; } }
                        else { if (h > maxPx) { w = w*maxPx/h; h = maxPx; } }
                        c.width = w; c.height = h;
                        c.getContext('2d').drawImage(img, 0, 0, w, h);
                        res(c.toDataURL('image/jpeg', q));
                    };
                    img.src = ev.target.result;
                };
                r.readAsDataURL(file);
            });
        }

        async function processarFoto(file) {
            if (!file) return;
            const st = document.getElementById('ocrStatus');
            st.style.color = '#555'; st.textContent = '⏳ Processando...';
            document.getElementById('overlay').classList.add('on');
            try {
                const urlFoto = await comprimirImagem(file, 400, 0.75);
                fotoBase64 = urlFoto;
                const prev = document.getElementById('fotoPreview');
                prev.src = urlFoto; prev.style.display = 'block';
                const urlOcr = await comprimirImagem(file, 1000, 0.85);
                const fd = new FormData();
                fd.append('base64Image', urlOcr);
                fd.append('language', 'por');
                fd.append('isOverlayRequired', 'false');
                fd.append('detectOrientation', 'true');
                fd.append('scale', 'true');
                fd.append('OCREngine', '2');
                const resp = await fetch('https://api.ocr.space/parse/image', { method: 'POST', headers: { 'apikey': 'K81660479788957' }, body: fd });
                const data = await resp.json();
                const texto = (data?.ParsedResults?.[0]?.ParsedText || '').trim();
                document.getElementById('overlay').classList.remove('on');
                const linhas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 1);
                document.getElementById('ocrTexto').value = linhas.join('\n');
                document.getElementById('ocrFotoPreview').src = urlFoto;
                document.getElementById('ocrFotoPreview').style.display = 'block';
                document.getElementById('ocrBg').classList.add('on');
                st.textContent = '';
            } catch(e) {
                document.getElementById('overlay').classList.remove('on');
                st.style.color = '#e67e00';
                st.textContent = '⚠️ OCR falhou. Foto salva — digite o nome.';
            }
        }

        document.getElementById('inputCamera').addEventListener('change', function() { processarFoto(this.files[0]); this.value=''; });
        document.getElementById('inputGaleria').addEventListener('change', function() { processarFoto(this.files[0]); this.value=''; });

        function confirmarOcr() {
            const nome = document.getElementById('ocrTexto').value.trim().split('\n')[0].trim();
            if (nome) {
                document.getElementById('nome').value = nome;
                const st = document.getElementById('ocrStatus');
                st.style.color = '#28a745'; st.textContent = '✅ Nome e foto salvos!';
                setTimeout(() => st.textContent = '', 3000);
            }
            fecharOcr();
        }
        function fecharOcr() { document.getElementById('ocrBg').classList.remove('on'); }

        function salvar() {
            const nome = document.getElementById('nome').value.trim();
            if (!nome) return alert("O nome é obrigatório!");
            let vinhos = JSON.parse(localStorage.getItem(DB_NAME) || "[]");
            const id = document.getElementById('wineId').value;
            const novo = {
                id: id ? Number(id) : Date.now(), nome,
                uva: document.getElementById('uva').value || "",
                local: document.getElementById('local').value || "",
                safra: document.getElementById('safra').value || "",
                valor: parseFloat(document.getElementById('valor').value) || 0,
                data: document.getElementById('data').value || new Date().toISOString().split('T')[0],
                quantidade: parseInt(document.getElementById('quantidade').value) || 0,
                nota: notaSel,
                avaliacao: document.getElementById('avaliacao').value || "",
                foto: fotoBase64
            };
            if (id) vinhos = vinhos.map(v => v.id === Number(id) ? novo : v);
            else vinhos.push(novo);
            localStorage.setItem(DB_NAME, JSON.stringify(vinhos));
            fecharForm();
            carregar();
        }

        function limpar() {
            ['wineId','nome','uva','local','safra','valor','avaliacao'].forEach(k => document.getElementById(k).value = '');
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
            document.getElementById('quantidade').value = '1';
            document.getElementById('ocrStatus').textContent = '';
            const p = document.getElementById('fotoPreview');
            p.style.display = 'none'; p.src = '';
            fotoBase64 = ''; setNota(5);
            document.getElementById('btnMain').textContent = 'GRAVAR VINHO';
            document.getElementById('btnCancel').style.display = 'none';
            document.getElementById('formTitulo').textContent = 'Adicionar Vinho';
        }

        function prepararEdicao(id) {
            const v = JSON.parse(localStorage.getItem(DB_NAME)||"[]").find(x => x.id === id);
            if (!v) return;
            document.getElementById('wineId').value = v.id;
            document.getElementById('nome').value = v.nome;
            document.getElementById('uva').value = v.uva||'';
            document.getElementById('local').value = v.local||'';
            document.getElementById('safra').value = v.safra||'';
            document.getElementById('valor').value = v.valor||'';
            document.getElementById('data').value = v.data||'';
            document.getElementById('quantidade').value = v.quantidade||0;
            document.getElementById('avaliacao').value = v.avaliacao||'';
            fotoBase64 = v.foto||'';
            if (fotoBase64) { const p = document.getElementById('fotoPreview'); p.src = fotoBase64; p.style.display = 'block'; }
            setNota(v.nota||5);
            document.getElementById('btnMain').textContent = 'ATUALIZAR';
            document.getElementById('btnCancel').style.display = 'block';
            document.getElementById('formTitulo').textContent = 'Editar Vinho';
            document.getElementById('modalBg').classList.add('on');
        }

        function excluir(id) {
            if (!confirm("Excluir este vinho?")) return;
            localStorage.setItem(DB_NAME, JSON.stringify(JSON.parse(localStorage.getItem(DB_NAME)||"[]").filter(x => x.id !== id)));
            carregar();
        }

        function duplicar(id) {
            let v = JSON.parse(localStorage.getItem(DB_NAME)||"[]");
            const o = v.find(x => x.id === id);
            if (!o) return;
            v.push(Object.assign({}, o, { id: Date.now(), data: new Date().toISOString().split('T')[0] }));
            localStorage.setItem(DB_NAME, JSON.stringify(v));
            carregar();
        }

        function ajustar(id, delta) {
            let v = JSON.parse(localStorage.getItem(DB_NAME)||"[]");
            v = v.map(x => { if (x.id === id) x.quantidade = Math.max(0, (parseInt(x.quantidade)||0)+delta); return x; });
            localStorage.setItem(DB_NAME, JSON.stringify(v));
            carregar();
        }

        function carregar() {
            const busca = (document.getElementById('buscaTexto').value||"").toLowerCase();
            const ordem = document.getElementById('ordemLista').value;
            const status = document.getElementById('filtroStatus').value;
            let vinhos = JSON.parse(localStorage.getItem(DB_NAME)||"[]");

            const est = vinhos.filter(v => (v.local||"").toLowerCase()==="estoque");
            const tQ = est.reduce((a,v) => a+(parseInt(v.quantidade)||0), 0);
            const tV = est.reduce((a,v) => a+(parseFloat(v.valor)||0)*(parseInt(v.quantidade)||0), 0);
            const comNota = vinhos.filter(v => v.nota > 0);
            const media = comNota.length ? (comNota.reduce((a,v) => a+v.nota, 0)/comNota.length).toFixed(1) : '—';
            document.getElementById('sQtd').textContent = tQ + ' garrafas';
            document.getElementById('sNota').textContent = comNota.length ? media + ' ★' : '—';
            document.getElementById('sValor').textContent = 'R$ ' + tV.toFixed(2);

            vinhos.sort((a,b) => {
                const d1=new Date(a.data).getTime()||0, d2=new Date(b.data).getTime()||0;
                if (ordem==="dataDesc") return d2-d1;
                if (ordem==="dataAsc") return d1-d2;
                if (ordem==="notaDesc") return (b.nota||0)-(a.nota||0);
                return b.id-a.id;
            });

            const filtrados = vinhos.filter(v => {
                const t = ((v.nome||"")+(v.uva||"")+(v.local||"")).toLowerCase();
                const loc = (v.local||"").toLowerCase();
                let ms = true;
                if (status==="estoque") ms = loc==="estoque";
                if (status==="consumidos") ms = loc!=="estoque";
                return t.includes(busca) && ms;
            });

            const lista = document.getElementById('lista');
            if (!filtrados.length) { lista.innerHTML = "<p class='empty'>Nenhum registro encontrado.</p>"; return; }

            lista.innerHTML = filtrados.map(v => {
                const dataBR = v.data ? v.data.split('-').reverse().join('/') : '--/--/--';
                const consumido = (v.local||"").toLowerCase() !== "estoque";
                const foto = v.foto
                    ? `<img src="${v.foto}" class="wine-foto" onerror="this.outerHTML='<div class=wine-foto-ph>🍷</div>'">`
                    : `<div class="wine-foto-ph">🍷</div>`;
                return `
                <div class="wine-card">
                    <div class="wine-card-inner">
                        ${foto}
                        <div class="wine-body">
                            <div class="wine-nome">${v.nome}</div>
                            <div class="wine-sub">${[v.uva,v.safra].filter(Boolean).join(' · ')}</div>
                            <div class="wine-stars">${renderStars(v.nota)}</div>
                            <div class="wine-meta">
                                📍 ${v.local||'Sem local'} &nbsp;🗂 ${v.quantidade||0} un.<br>
                                📅 ${dataBR} &nbsp;<span class="wine-valor">R$ ${(parseFloat(v.valor)||0).toFixed(2)}</span>
                            </div>
                            ${v.avaliacao ? `<div class="wine-aval">"${v.avaliacao}"</div>` : ''}
                            <div class="wine-qty">
                                <button class="btn-qty" onclick="ajustar(${v.id},-1)">−</button>
                                <span class="qty-val">${v.quantidade||0}</span>
                                <button class="btn-qty" onclick="ajustar(${v.id},+1)">+</button>
                            </div>
                        </div>
                    </div>
                    <div class="wine-footer">
                        ${consumido ? '<span class="badge-cons">🍷 Consumido</span>' : '<span></span>'}
                        <div class="wine-actions">
                            <button class="btn-sm" style="background:#5a9e6f" onclick="prepararEdicao(${v.id})">Editar</button>
                            <button class="btn-sm" style="background:#dc3545" onclick="excluir(${v.id})">Apagar</button>
                            <button class="btn-sm" style="background:#6c757d" onclick="duplicar(${v.id})">Duplicar</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function exportarDados() {
            const data = localStorage.getItem(DB_NAME);
            if (!data||data==="[]") return alert("Sem dados.");
            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([data], {type:"text/plain"}));
            a.download = "backup_vinhos.txt"; a.click();
        }

        function importarDados(e) {
            const file = e.target.files[0]; if (!file) return;
            const r = new FileReader();
            r.onload = x => {
                try {
                    const j = JSON.parse(x.target.result);
                    if (Array.isArray(j)) { localStorage.setItem(DB_NAME, x.target.result); carregar(); alert("Backup restaurado!"); }
                } catch { alert("Arquivo inválido."); }
            };
            r.readAsText(file);
        }

        window.onload = montarInterface;
    </script>
</body>
</html>
